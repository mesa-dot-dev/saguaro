name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip publish steps)"
        required: false
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.1"

jobs:
  detect:
    name: Detect Version Change
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      version: ${{ steps.detect.outputs.version }}
      dry_run: ${{ steps.detect.outputs.dry_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: detect
        shell: bash
        run: |
          set -euo pipefail

          current=$(node -e 'const v=require("./package.json").version.trim();if(!/^\d+\.\d+\.\d+/.test(v)){process.stderr.write("Invalid semver: "+JSON.stringify(v));process.exit(1)}process.stdout.write(v)')
          dry_run="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}"
          should_release="false"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            should_release="true"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            previous=$(git show HEAD^:package.json | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>process.stdout.write(JSON.parse(d).version))')
            if [ "$current" != "$previous" ]; then
              should_release="true"
            fi
          fi

          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"
          echo "version=$current" >> "$GITHUB_OUTPUT"
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"

          echo "Version: $current | Release: $should_release | Dry run: $dry_run"

  # ── npm publish (unchanged) ───────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: Pack npm tarball
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.detect.outputs.version }}"
          tarball="mesa-code-review-${version}.tgz"

          npm pack
          mv mesadev-code-review-*.tgz "$tarball"

          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail

          tarball="${{ steps.pack.outputs.tarball }}"
          smoke_dir="$(mktemp -d)"

          echo "Extracting tarball..."
          tar xzf "$tarball" -C "$smoke_dir"
          cd "$smoke_dir/package"

          echo "Installing dependencies..."
          npm install --production

          echo "Verifying WASM files..."
          for f in \
            node_modules/web-tree-sitter/tree-sitter.wasm \
            node_modules/tree-sitter-wasms/out/tree-sitter-python.wasm \
            node_modules/tree-sitter-wasms/out/tree-sitter-go.wasm \
            node_modules/tree-sitter-wasms/out/tree-sitter-rust.wasm \
            node_modules/tree-sitter-wasms/out/tree-sitter-java.wasm \
            node_modules/tree-sitter-wasms/out/tree-sitter-kotlin.wasm; do
            if [ ! -f "$f" ]; then
              echo "FAIL: Missing WASM file: $f" >&2
              exit 1
            fi
          done
          echo "All WASM files present."

          echo "Running mesa --help..."
          node dist/cli/bin.js --help > /dev/null

          rm -rf "$smoke_dir"
          echo "Smoke test passed."

      - uses: actions/setup-node@v4
        if: needs.detect.outputs.dry_run != 'true'
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        if: needs.detect.outputs.dry_run != 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Build compiled binaries for Homebrew ──────────────────────────────
  build:
    name: Build Binary (${{ matrix.target }})
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            os: macos-latest
          - target: linux-x64
            os: ubuntu-latest
          - target: linux-arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: Compile binary
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.detect.outputs.version }}"

          bun build src/cli/bin.tsx --compile --minify \
            --define "__MESA_VERSION__=\"$version\"" \
            --external @swc/wasm \
            --outfile mesa

      - name: Package binary + WASM
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.detect.outputs.version }}"
          target="${{ matrix.target }}"
          tarball="mesa-review-${version}-${target}.tar.gz"

          chmod +x mesa

          mkdir -p wasm
          cp node_modules/web-tree-sitter/tree-sitter.wasm wasm/
          for lang in python go rust java kotlin; do
            cp "node_modules/tree-sitter-wasms/out/tree-sitter-${lang}.wasm" wasm/
          done

          tar -czf "$tarball" mesa wasm/

      - name: Smoke test binary
        shell: bash
        run: |
          ./mesa --help > /dev/null
          echo "Binary smoke test passed."

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: mesa-review-*.tar.gz

  # ── Publish binaries to Homebrew tap ──────────────────────────────────
  publish-homebrew:
    name: Publish to Homebrew
    needs: [detect, build]
    if: needs.detect.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Compute checksums
        id: checksums
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.detect.outputs.version }}"

          for target in darwin-arm64 linux-x64 linux-arm64; do
            tarball="mesa-review-${version}-${target}.tar.gz"
            sha256=$(shasum -a 256 "$tarball" | awk '{print $1}')
            key=$(echo "$target" | tr '-' '_')
            echo "sha256_${key}=$sha256" >> "$GITHUB_OUTPUT"
          done

      - name: Upload binaries to homebrew-tap releases
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.detect.outputs.version }}"
          release_tag="mesa-code-review-v$version"

          if gh release view "$release_tag" -R "mesa-dot-dev/homebrew-tap" >/dev/null 2>&1; then
            echo "Release $release_tag already exists in homebrew-tap." >&2
            exit 1
          fi

          gh release create "$release_tag" \
            mesa-review-*.tar.gz \
            --title "Mesa Code Review CLI v$version" \
            --notes "Binary release for Homebrew" \
            -R "mesa-dot-dev/homebrew-tap"

      - uses: actions/checkout@v4
        with:
          path: source

      - name: Generate and push formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.detect.outputs.version }}"
          release_tag="mesa-code-review-v$version"
          base_url="https://github.com/mesa-dot-dev/homebrew-tap/releases/download/$release_tag"

          sha256_darwin_arm64="${{ steps.checksums.outputs.sha256_darwin_arm64 }}"
          sha256_linux_x64="${{ steps.checksums.outputs.sha256_linux_x64 }}"
          sha256_linux_arm64="${{ steps.checksums.outputs.sha256_linux_arm64 }}"

          template="$GITHUB_WORKSPACE/source/formula-code-review.rb.tmpl"

          # Generate a formula from the template with the given class name
          render_formula() {
            local class_name="$1"
            sed \
              -e "s|\${FORMULA_CLASS_NAME}|${class_name}|g" \
              -e "s|\${VERSION}|${version}|g" \
              -e "s|\${URL_DARWIN_ARM64}|${base_url}/mesa-review-${version}-darwin-arm64.tar.gz|g" \
              -e "s|\${SHA256_DARWIN_ARM64}|${sha256_darwin_arm64}|g" \
              -e "s|\${URL_LINUX_X64}|${base_url}/mesa-review-${version}-linux-x64.tar.gz|g" \
              -e "s|\${SHA256_LINUX_X64}|${sha256_linux_x64}|g" \
              -e "s|\${URL_LINUX_ARM64}|${base_url}/mesa-review-${version}-linux-arm64.tar.gz|g" \
              -e "s|\${SHA256_LINUX_ARM64}|${sha256_linux_arm64}|g" \
              "$template"
          }

          # Clone the tap repo
          tap_url="https://x-access-token:${GH_TOKEN}@github.com/mesa-dot-dev/homebrew-tap.git"
          git clone --depth 1 -b staged "$tap_url" homebrew-tap || \
            git clone --depth 1 "$tap_url" homebrew-tap

          cd homebrew-tap
          git checkout staged 2>/dev/null || git checkout -b staged

          mkdir -p Formula

          render_formula "CodeReview" > "Formula/code-review.rb"
          render_formula "CodeReviewAT${version//\./_}" > "Formula/code-review@${version}.rb"

          git config user.name "mesa-ci[bot]"
          git config user.email "ci-bot@mesa.dev"
          git add Formula/
          git commit -m "Update code-review formula to ${version}"
          git push --force-with-lease origin staged
