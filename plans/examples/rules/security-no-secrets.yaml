# Rule: No Hardcoded Secrets

id: no-hardcoded-secrets
title: "No hardcoded secrets or credentials"
severity: error

globs:
  - "**/*.ts"
  - "**/*.tsx"
  - "**/*.js"
  - "**/*.jsx"
  - "**/*.py"
  - "**/*.rs"
  - "**/*.go"
  - "!**/*.test.*"
  - "!**/*.spec.*"
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/__tests__/**"

instructions: |
  Never hardcode secrets, API keys, passwords, or other credentials 
  in source code. Use environment variables or secret management 
  systems instead.
  
  ## What Counts as a Secret
  
  - API keys (sk-*, pk-*, api_*, etc.)
  - Database passwords
  - JWT secrets
  - OAuth client secrets
  - Encryption keys
  - Service account credentials
  - Webhook secrets
  - Any token used for authentication
  
  ## Why This Matters
  
  Hardcoded secrets:
  - End up in git history forever
  - Get leaked in logs, error messages
  - Can't be rotated without code changes
  - May be exposed in client bundles
  - Violate security compliance (SOC2, etc.)
  
  ## Violations
  
  ```typescript
  // BAD: Hardcoded API key
  const STRIPE_KEY = "sk_live_abc123...";
  
  // BAD: Hardcoded in config object
  const config = {
      apiKey: "AIzaSy...",
      secret: "my-secret-key"
  };
  
  // BAD: Hardcoded database URL with password
  const DATABASE_URL = "postgres://user:password@host:5432/db";
  ```
  
  ## Correct Implementation
  
  ```typescript
  // GOOD: Environment variable
  const STRIPE_KEY = process.env.STRIPE_SECRET_KEY;
  
  // GOOD: Using a secrets manager
  const secret = await secretsManager.get('stripe-key');
  
  // GOOD: Config from environment
  const config = {
      apiKey: process.env.API_KEY,
      secret: process.env.APP_SECRET
  };
  ```
  
  ## Patterns That Look Like Secrets
  
  Be suspicious of:
  - Strings that look like "sk_*", "pk_*", "api_*"
  - Base64-encoded strings of significant length
  - Strings assigned to variables named *_KEY, *_SECRET, *_TOKEN
  - URLs with embedded credentials
  - Strings matching JWT format (xxx.yyy.zzz)
  
  ## False Positives to Ignore
  
  - Public keys meant to be public (Stripe publishable key in frontend)
  - Example/placeholder values in documentation
  - Test fixtures with fake credentials
  - Schema definitions that describe secret fields

examples:
  violations:
    - 'sk_live_'
    - 'sk_test_'
    - 'apiKey: "'
    - 'secret: "'
    - 'password: "'
    - 'token: "'
  compliant:
    - "process.env."
    - "env.get("
    - "secretsManager"
    - "vault.read("

tags:
  - security
  - secrets
  - compliance
