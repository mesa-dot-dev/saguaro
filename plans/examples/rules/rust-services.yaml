# Rule: Service Spawn Pattern
#
# This is an example rule from the "Request for Product" that inspired
# the Mesa local review agent design.

id: service-spawn-pattern
title: "Web services must use spawn pattern"
severity: error

globs:
  - "**/lib.rs"

instructions: |
  Every Rust web service MUST be exposed as lib.rs with a single 
  `spawn_<service>(...)` function that:
  
  1. Takes all dependencies as parameters
  2. Takes a CancellationToken for graceful shutdown
  3. Spawns the service into tokio
  4. Returns a JoinHandle
  
  ## Why This Matters
  
  This pattern ensures:
  - All dependencies are explicit (no hidden globals)
  - Graceful shutdown is built-in
  - Services are composable and testable
  - Clear ownership and lifecycle management
  
  ## Required Signature
  
  ```rust
  pub async fn spawn_api_server(
      // All dependencies explicitly listed
      db: Pool<Postgres>,
      redis: RedisClient,
      config: Config,
      // Always last: cancellation token
      cancellation_token: CancellationToken,
  ) -> JoinHandle<Result<()>>
  ```
  
  ## Violations
  
  ```rust
  // BAD: No spawn function, just main
  #[tokio::main]
  async fn main() {
      let server = Server::new();
      server.run().await;
  }
  
  // BAD: Missing cancellation token
  pub async fn spawn_server(db: Pool) -> JoinHandle<()> { ... }
  
  // BAD: Hidden dependencies (globals)
  pub async fn spawn_server(token: CancellationToken) -> JoinHandle<()> {
      let db = get_global_db();  // Hidden!
  }
  ```
  
  ## Correct Implementation
  
  ```rust
  // lib.rs
  use tokio::task::JoinHandle;
  use tokio_util::sync::CancellationToken;
  
  pub async fn spawn_api_server(
      db: Pool<Postgres>,
      config: ApiConfig,
      cancellation_token: CancellationToken,
  ) -> JoinHandle<Result<()>> {
      tokio::spawn(async move {
          let app = build_router(db, config);
          
          axum::serve(listener, app)
              .with_graceful_shutdown(cancellation_token.cancelled_owned())
              .await?;
          
          Ok(())
      })
  }
  ```
  
  ## Main Binary
  
  ```rust
  // main.rs
  #[tokio::main]
  async fn main() -> Result<()> {
      let token = CancellationToken::new();
      let db = create_pool().await?;
      let config = Config::load()?;
      
      let handle = spawn_api_server(db, config, token.clone()).await;
      
      // Wait for shutdown signal
      signal::ctrl_c().await?;
      token.cancel();
      handle.await??;
      
      Ok(())
  }
  ```

examples:
  compliant:
    - "pub async fn spawn_"
    - "cancellation_token: CancellationToken"
    - "-> JoinHandle<"

tags:
  - rust
  - architecture
  - services
  - tokio
