# Rule: Ban Direct Wall Clock Access
# 
# This is an example rule from the "Request for Product" that inspired
# the Mesa local review agent design.

id: no-wall-clock
title: "Ban direct wall clock access"
severity: error

globs:
  - "**/*.rs"
  - "!**/tests/**"
  - "!**/benches/**"
  - "!**/examples/**"

instructions: |
  Utc::now() or any analogous "get wall clock time" function should be 
  banned from Rust services. Use a Clock trait instead. Always dependency 
  inject time.
  
  ## Why This Matters
  
  Direct wall clock access makes code:
  - Non-deterministic and hard to test
  - Impossible to simulate time-based scenarios
  - Prone to flaky tests that depend on real time
  
  ## Pattern to Follow
  
  Define a Clock trait and inject it:
  
  ```rust
  pub trait Clock: Send + Sync {
      fn now(&self) -> DateTime<Utc>;
  }
  
  pub struct SystemClock;
  impl Clock for SystemClock {
      fn now(&self) -> DateTime<Utc> { Utc::now() }
  }
  
  pub struct MockClock { pub time: DateTime<Utc> }
  impl Clock for MockClock {
      fn now(&self) -> DateTime<Utc> { self.time }
  }
  ```
  
  ## Violations
  
  ```rust
  // BAD: Direct wall clock access
  fn process_event() {
      let now = Utc::now();
      let timestamp = SystemTime::now();
      let instant = Instant::now();
  }
  ```
  
  ## Correct Implementation
  
  ```rust
  // GOOD: Injected clock dependency
  fn process_event(clock: &dyn Clock) {
      let now = clock.now();
  }
  
  // GOOD: Method on struct with clock field
  impl EventProcessor {
      fn process(&self) {
          let now = self.clock.now();
      }
  }
  ```
  
  ## Exceptions
  
  - Test files (excluded via globs)
  - Benchmarks (excluded via globs)
  - The Clock trait implementation itself (SystemClock)

examples:
  violations:
    - "Utc::now()"
    - "SystemTime::now()"
    - "Instant::now()"
    - "chrono::Local::now()"
    - "time::OffsetDateTime::now_utc()"
  compliant:
    - "clock.now()"
    - "self.clock.now()"
    - "self.clock.utc_now()"
    - "time_provider.current_time()"

tags:
  - rust
  - testing
  - architecture
  - dependency-injection
