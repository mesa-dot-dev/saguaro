# Rule: Require Error Boundaries for Data-Fetching Components

id: require-error-boundary
title: "Components with data fetching must have error boundaries"
severity: error

globs:
  - "src/components/**/*.tsx"
  - "src/features/**/*.tsx"
  - "src/pages/**/*.tsx"
  - "src/routes/**/*.tsx"

instructions: |
  Any React component that fetches data or has complex async state 
  MUST be wrapped in an error boundary. This prevents the entire 
  app from crashing when a single component fails.
  
  ## When This Rule Applies
  
  Components that:
  - Use useQuery, useSWR, or similar data fetching hooks
  - Use useEffect with async operations
  - Have try/catch blocks for async operations
  - Load data on mount
  
  ## Why This Matters
  
  Without error boundaries:
  - A single API failure crashes the entire app
  - Users see white screens instead of helpful errors
  - No way to recover without full page reload
  - Poor user experience and lost work
  
  ## Violations
  
  ```tsx
  // BAD: Data fetching without error boundary
  function UserProfile({ userId }: Props) {
      const { data, error } = useQuery(['user', userId], fetchUser);
      
      if (error) return <div>Error!</div>;  // This won't catch render errors
      return <ProfileCard user={data} />;
  }
  
  // BAD: Async useEffect without boundary
  function Dashboard() {
      const [data, setData] = useState(null);
      
      useEffect(() => {
          fetchDashboardData().then(setData);
      }, []);
      
      return <DashboardView data={data} />;
  }
  ```
  
  ## Correct Implementation
  
  ```tsx
  // GOOD: Wrapped in error boundary
  function UserProfilePage({ userId }: Props) {
      return (
          <ErrorBoundary fallback={<UserProfileError />}>
              <Suspense fallback={<UserProfileSkeleton />}>
                  <UserProfile userId={userId} />
              </Suspense>
          </ErrorBoundary>
      );
  }
  
  // GOOD: Using react-error-boundary
  import { ErrorBoundary } from 'react-error-boundary';
  
  function Dashboard() {
      return (
          <ErrorBoundary 
              FallbackComponent={DashboardError}
              onReset={() => window.location.reload()}
          >
              <DashboardContent />
          </ErrorBoundary>
      );
  }
  ```
  
  ## What to Look For
  
  When reviewing, check if components with these patterns have boundaries:
  - `useQuery(`, `useSWR(`, `useMutation(`
  - `useEffect(` with `fetch(` or `async`
  - `await` in component body or effects
  - `.then(` chains in effects
  
  The boundary can be:
  - In the component itself
  - In a parent component (page/route level)
  - Using Suspense + ErrorBoundary combo

examples:
  violations:
    - "useQuery("
    - "useSWR("
    - "fetch("
  compliant:
    - "<ErrorBoundary"
    - "ErrorBoundary>"
    - "<Suspense"

tags:
  - react
  - error-handling
  - resilience
  - typescript
